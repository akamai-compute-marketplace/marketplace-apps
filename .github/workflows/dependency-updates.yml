---
name: Dependency Updates

on:
  schedule:
    - cron: '0 9 15 * *'
  workflow_dispatch:

jobs:
  update-dependencies:
    name: Update apps dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      any_updates: ${{ steps.update.outputs.any_updates }}
      pr_url: ${{ steps.create_pr.outputs.pr_url }}
    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DEPS_APP_ID }}
          private-key: ${{ secrets.DEPS_APP_SECRET }}

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate_token.outputs.token }}
          ref: develop
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check and update dependencies
        id: update
        run: |
          BRANCH="chore/deps-update-$(date +%Y-%m-%d)"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          python3 .github/scripts/python-deps-check.py
          python3 .github/scripts/ansible-deps-check.py
          python3 .github/scripts/generate-pr-body.py

      - name: Commit and push branch
        if: steps.update.outputs.any_updates == 'true'
        run: |
          git config user.name "Galactic Snake Bot"
          git config user.email "3400069+quick-deploy-dependency-update-bot[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.update.outputs.branch }}"
          git add -u apps/
          git commit -m "chore: update dependencies ($(date +%Y-%m-%d))"
          git push origin "${{ steps.update.outputs.branch }}"

      - name: Create Pull Request
        id: create_pr
        if: steps.update.outputs.any_updates == 'true'
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          PR_URL=$(gh pr create \
            --title "chore: Dependency Updates $(date +%Y-%m-%d)" \
            --body-file /tmp/pr_body.md \
            --base develop \
            --head "${{ steps.update.outputs.branch }}" \
            --label "dependencies")
          echo "Successfully created PR: $PR_URL"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

  slack-notification:
    name: Send report to Slack
    runs-on: ubuntu-latest
    needs: update-dependencies
    if: needs.update-dependencies.outputs.any_updates == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate and send report to Slack
        env:
          REPO_NAME: ${{ github.repository }}
          PR_URL: ${{ needs.update-dependencies.outputs.pr_url }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: bash .github/scripts/report-dependency-pr.sh
