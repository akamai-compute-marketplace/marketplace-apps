---
- name: Install required packages for Node.js
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Create directory for NodeSource GPG key
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download NodeSource GPG key
  get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /tmp/nodesource-repo.gpg.key
    mode: '0644'

- name: Import NodeSource GPG key
  shell: |
    set -o pipefail
    cat /tmp/nodesource-repo.gpg.key | gpg --dearmor > /etc/apt/keyrings/nodesource.gpg
  args:
    creates: /etc/apt/keyrings/nodesource.gpg
    executable: /bin/bash

- name: Add NodeSource repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ node_version }} nodistro main"
    filename: nodesource
    state: present
    update_cache: true

- name: Update apt and install Node.js
  apt:
    name: nodejs
    state: present
    update_cache: true

- name: Verify Node.js installation
  command: node --version
  register: node_version
  changed_when: false
