---
- name: Install OpenClaw globally as openclaw user (using pnpm)
  shell:
    cmd: pnpm install -g openclaw@latest
    executable: /bin/bash
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    PNPM_HOME: "{{ pnpm_home }}"
    PATH: "{{ pnpm_path }}"
    HOME: "{{ openclaw_home }}"
  register: openclaw_install
  changed_when: "'Already up to date' not in openclaw_install.stdout"

- name: Install OpenClaw deps
  shell:
    cmd: pnpm add @buape/carbon @larksuiteoapi/node-sdk @slack/web-api grammy
    executable: /bin/bash
    chdir: "{{ openclaw_home }}"
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    PNPM_HOME: "{{ pnpm_home }}"
    PATH: "{{ pnpm_path }}"
    HOME: "{{ openclaw_home }}"

- name: Verify openclaw installation
  shell:
    cmd: openclaw --version
    executable: /bin/bash
  become: true
  become_user: "{{ openclaw_user }}"
  environment:
    PNPM_HOME: "{{ pnpm_home }}"
    PATH: "{{ pnpm_path }}"
    HOME: "{{ openclaw_home }}"
  register: openclaw_version
  changed_when: false

- name: Display installed openclaw version
  debug:
    msg: "OpenClaw installed from npm: {{ openclaw_version.stdout }}"
