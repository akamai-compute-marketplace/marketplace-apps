---
- name: Create Joomla docroot
  file:
    path: "{{ joomla_install_dir }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Download Joomla tarball
  get_url:
    url: "https://downloads.joomla.org/cms/joomla5/{{ joomla_version }}/Joomla_{{ joomla_version }}-Stable-Full_Package.tar.gz"
    dest: /tmp/joomla.tar.gz
    mode: '0644'

- name: Extract Joomla tarball
  unarchive:
    src: /tmp/joomla.tar.gz
    dest: "{{ joomla_install_dir }}"
    remote_src: true
    owner: www-data
    group: www-data
    creates: "{{ joomla_install_dir }}/index.php"

- name: Remove downloaded tarball
  file:
    path: /tmp/joomla.tar.gz
    state: absent

- name: Create Joomla logs directory
  file:
    path: "{{ joomla_install_dir }}/logs"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Run Joomla CLI installer to bypass open install web UI
  command:
    chdir: "{{ joomla_install_dir }}"
    creates: "{{ joomla_install_dir }}/configuration.php"
    argv:
      - sudo
      - -u
      - www-data
      - php
      - installation/joomla.php
      - install
      - "--site-name={{ site_name }}"
      - "--admin-user={{ joomla_admin_fullname }}"
      - "--admin-username={{ joomla_admin_username }}"
      - "--admin-password={{ joomla_admin_password }}"
      - "--admin-email={{ admin_email }}"
      - --db-type=mysqli
      - --db-host=localhost
      - "--db-user={{ joomla_db_user }}"
      - "--db-pass={{ joomla_db_password }}"
      - "--db-name={{ joomla_db_name }}"
      - --db-encryption=0
      - --no-interaction
  no_log: true
