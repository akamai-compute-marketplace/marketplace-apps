---
- name: Issue Let's Encrypt cert and configure HTTPS # noqa: var-naming[no-role-prefix] — webserver_stack is the certbot_ssl helper role's own selector var
  import_role:
    name: certbot_ssl
  vars:
    webserver_stack: lamp

- name: Add redirect to vhost
  blockinfile:
    path: /etc/apache2/sites-available/microweber-le-ssl.conf
    insertbefore: '^SSLCertificateFile'
    marker: "# {mark}"
    block: |
      RewriteCond %{HTTP_HOST} !={{ _domain }}
      RewriteRule ^ https://{{ _domain }}%{REQUEST_URI} [R=permanent,L]
  notify: Reload apache2
