---
- name: Ensure /opt/vault/data exists and is owned by vault
  file:
    path: /opt/vault/data
    state: directory
    owner: vault
    group: vault
    mode: '0750'

- name: Write marketplace vault.hcl
  template:
    src: vault.hcl.j2
    dest: /etc/vault.d/vault.hcl
    owner: root
    group: vault
    mode: '0640'

- name: Enable and start Vault
  systemd_service:
    name: vault
    state: started
    enabled: true
    daemon_reload: true
