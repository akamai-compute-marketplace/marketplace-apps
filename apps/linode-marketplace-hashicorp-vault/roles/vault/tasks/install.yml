---
- name: Add HashiCorp GPG key
  ansible.builtin.get_url:
    url: https://apt.releases.hashicorp.com/gpg
    dest: /tmp/hashicorp-archive-keyring.asc
    mode: '0644'

- name: Dearmor HashiCorp GPG key into apt keyring
  ansible.builtin.command:
    cmd: gpg --batch --yes --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg /tmp/hashicorp-archive-keyring.asc
    creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg

- name: Resolve distribution codename
  ansible.builtin.command: lsb_release -cs
  register: lsb_codename
  changed_when: false

- name: Add HashiCorp apt repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/hashicorp.list
    content: "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ lsb_codename.stdout }} main\n"
    mode: '0644'

- name: Install Vault package
  ansible.builtin.apt:
    name: vault
    state: present
    update_cache: true
