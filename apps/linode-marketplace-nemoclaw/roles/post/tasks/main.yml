---
- name: Install requested add-ons
  import_role:
    name: addons
  when: add_ons != ['none']

- name: Copy MOTD template to /etc/motd
  template:
    src: motd.j2
    dest: /etc/motd
    mode: '0600'
    owner: '{{ username }}'
    group: '{{ username }}'

- name: Write credentials to file
  copy:
    dest: '/home/{{ username }}/.credentials'
    mode: '0600'
    owner: '{{ username }}'
    group: '{{ username }}'
    content: |
      Sudo Username: {{ username }}
      Sudo Password: {{ password }}

      # NemoClaw
      NemoClaw runs as a limited user on this instance called {{ nemoclaw_user }}.
      NemoClaw dashboard access: use SSH tunneling.
      Tunnel command (run locally): ssh -L 18789:127.0.0.1:18789 {{ username }}@{{ _domain }}
      Local dashboard URL: http://127.0.0.1:18789
      The dashboard device-auth token is generated by the interactive
      `nemoclaw onboard` wizard, which runs on your first login as root (or
      via sudo) - it cannot be pre-generated at deploy time because it
      requires an inference-provider credential only you can supply.
      See /etc/motd and the app README for onboarding instructions.
