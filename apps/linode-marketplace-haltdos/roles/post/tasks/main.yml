---
- name: Add addons
  import_role:
    name: addons
  when: add_ons != ['none']

- name: Copy MOTD template to /etc/motd
  template:
    src: templates/motd.j2
    dest: /etc/motd
    mode: '0600'
    owner: '{{ username }}'
    group: '{{ username }}'

- name: Writing creds into file
  copy:
    dest: '/home/{{ username }}/.credentials'
    mode: '0600'
    owner: '{{ username }}'
    group: '{{ username }}'
    content: |
      Sudo Username: {{ username }}
      Sudo Password: {{ password }}

      HaltDOS Management UI: https://{{ _domain }}:{{ haltdos_ext_port }}/setup
      NGINX Setup-Wizard Auth Username: {{ haltdos_htpasswd_user }}
      NGINX Setup-Wizard Auth Password: {{ haltdos_htpasswd_password }}

      First-run steps:
        1. Open the Management UI above and complete the wizard.
        2. In the UI, configure your first listener (Server + Operational mode).
        3. ONLY AFTER step 2, enable and start the WAF data plane:
              sudo systemctl enable --now offloader

      WARNING: Do NOT run `systemctl start offloader` before completing step 2.
      Without a configured listener, the WAF data plane will bind port 80 and
      expose its working directory (/root) over plain HTTP. The offloader is
      shipped disabled to prevent this; only enable it once you have at least
      one listener configured in the wizard.
