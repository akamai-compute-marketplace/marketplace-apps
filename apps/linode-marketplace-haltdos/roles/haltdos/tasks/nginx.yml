---
# Cert issuance MUST happen before nginx is installed:
#
# 1. We use --standalone HTTP-01 (not --nginx) because our nginx template uses
#    `listen 9000 ssl http2` — the certbot --nginx plugin only knows how to
#    add SSL on port 443, and it runs `nginx -t` before mutating, which
#    refuses any `listen … ssl` block that lacks a working cert reference.
#
# 2. Standalone certbot binds port 80 for the HTTP-01 challenge. If nginx
#    is already apt-installed, it auto-starts on port 80 and conflicts.
#    By running certbot first, port 80 is uncontended.
#
# 3. The nginx template (nginx.conf.j2) ships with explicit ssl_certificate
#    paths pointing at /etc/letsencrypt/live/{{ _domain }}/. Those files
#    must exist on disk before `nginx -t` can validate the config.
#
# Pattern matches apps/linode-marketplace-milvus/roles/milvus/tasks/nginx.yml
# and apps/linode-marketplace-passbolt/roles/passbolt/tasks/nginx.yml.

- name: Setting up SSL certificate (standalone HTTP-01)
  import_role:
    name: certbot_ssl
  vars:
    webserver_stack: standalone

- name: Install nginx + apache2-utils
  apt:
    name: [nginx, apache2-utils]
    state: present
    update_cache: true

- name: Create htpasswd for wizard endpoints
  community.general.htpasswd:
    path: "{{ haltdos_htpasswd_file }}"
    name: "{{ haltdos_htpasswd_user }}"
    password: "{{ haltdos_htpasswd_password }}"
    crypt_scheme: bcrypt
    owner: root
    group: www-data
    mode: '0640'
  no_log: true

- name: Create nginx site configuration
  template:
    src: nginx.conf.j2
    dest: "/etc/nginx/sites-available/{{ _domain }}"
    mode: '0644'
  notify: Restart nginx

- name: Enable HaltDOS nginx site
  file:
    src: "/etc/nginx/sites-available/{{ _domain }}"
    dest: "/etc/nginx/sites-enabled/{{ _domain }}"
    state: link
  notify: Restart nginx

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Restart nginx

- name: Validate nginx configuration before final restart
  command: nginx -t
  changed_when: false

- name: Enable + start nginx
  systemd_service:
    name: nginx
    state: started
    enabled: true
