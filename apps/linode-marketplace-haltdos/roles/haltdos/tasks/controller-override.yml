---
- name: Ensure systemd drop-in directory exists
  file:
    path: /etc/systemd/system/controller.service.d
    state: directory
    mode: '0755'

- name: Install controller systemd drop-in
  template:
    src: controller.service.override.conf.j2
    dest: /etc/systemd/system/controller.service.d/override.conf
    mode: '0644'
  notify: Restart controller

- name: Ensure controller is enabled (drop-in applies on next start)
  systemd_service:
    name: controller
    enabled: true
    daemon_reload: true

- name: Ensure offloader is enabled (do not start)
  systemd_service:
    name: offloader
    enabled: true
