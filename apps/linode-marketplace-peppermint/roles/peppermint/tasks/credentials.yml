---
- name: Wait for peppermint container to be healthy
  community.docker.docker_container_info:
    name: peppermint
  register: peppermint_container
  until: >
    peppermint_container.container.State.Running == true and
    (peppermint_container.container.State.Health.Status == 'healthy' or
     peppermint_container.container.State.Health is not defined)
  retries: 30
  delay: 10
  no_log: true

- name: Wait for database initialization and default admin user creation
  community.docker.docker_container_exec:
    container: peppermint_postgres
    command: >
      psql -U peppermint -d peppermint -t -c
      "SELECT COUNT(*) FROM \"User\" WHERE \"isAdmin\" = true;"
    env:
      PGPASSWORD: "{{ postgres_password }}"
  register: admin_user_check
  until: admin_user_check.stdout | trim == '1'
  retries: 30
  delay: 2
  failed_when: false

- name: Generate bcrypt hash for admin password
  command: python3 -c "import bcrypt, os; print(bcrypt.hashpw(os.environ['password'].encode(), bcrypt.gensalt(rounds=10)).decode())"
  environment:
    password: "{{ peppermint_admin_password }}"
  register: peppermint_admin_password_hash
  no_log: true

- name: Update peppermint admin password in database
  community.docker.docker_container_exec:
    container: peppermint_postgres
    command: >
      psql -U peppermint -d peppermint -c
      "UPDATE \"User\"
       SET password = '{{ peppermint_admin_password_hash.stdout }}',
           \"updatedAt\" = CURRENT_TIMESTAMP
       WHERE \"isAdmin\" = true;"
    env:
      PGPASSWORD: "{{ postgres_password }}"
  no_log: true
