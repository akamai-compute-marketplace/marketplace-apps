---
- name: Get server IP
  ansible.builtin.set_fact:
    server_ip: "{{ ansible_default_ipv4.address }}"

- name: Create deploy directory
  ansible.builtin.file:
    path: "{{ rtsurvey_deploy_dir }}"
    state: directory
    mode: '0750'

- name: Create ssl-trigger directory
  ansible.builtin.file:
    path: "{{ rtsurvey_deploy_dir }}/ssl-trigger"
    state: directory
    mode: '0777'

- name: Write initial ssl-trigger status
  ansible.builtin.copy:
    content: '{"status":"none","domain":""}'
    dest: "{{ rtsurvey_deploy_dir }}/ssl-trigger/status.json"
    mode: '0644'

- name: Write docker-compose.production.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ rtsurvey_deploy_dir }}/docker-compose.production.yml"
    mode: '0640'

- name: Write .env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ rtsurvey_deploy_dir }}/.env"
    mode: '0600'

- name: Create mysql-init directory
  ansible.builtin.file:
    path: "{{ rtsurvey_deploy_dir }}/mysql-init"
    state: directory
    mode: '0755'

- name: Create keycloak-import directory
  ansible.builtin.file:
    path: "{{ rtsurvey_deploy_dir }}/keycloak-import"
    state: directory
    mode: '0755'

- name: Write Keycloak MySQL init SQL
  ansible.builtin.template:
    src: mysql-init.sql.j2
    dest: "{{ rtsurvey_deploy_dir }}/mysql-init/01-keycloak-db.sql"
    mode: '0644'
  when: embed_keycloak

- name: Write Keycloak realm import JSON
  ansible.builtin.template:
    src: keycloak-realm.json.j2
    dest: "{{ rtsurvey_deploy_dir }}/keycloak-import/rtsurvey-realm.json"
    mode: '0644'
  when: embed_keycloak
