<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 263 94" width="263" height="94">
  <!-- Icon box -->
  <rect x="4" y="8" width="68" height="72" rx="6" ry="6" fill="#165382"/>

  <!-- Tablet outline inside box -->
  <rect x="20" y="16" width="36" height="48" rx="3" ry="3" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <!-- Tablet screen -->
  <rect x="23" y="20" width="30" height="34" rx="1" ry="1" fill="#ffffff" opacity="0.15"/>
  <!-- Tablet home button -->
  <circle cx="38" cy="58" r="3" fill="#ffffff" opacity="0.8"/>

  <!-- Checklist lines on tablet -->
  <line x1="27" y1="26" x2="37" y2="26" stroke="#F3AA31" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="31" x2="37" y2="31" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="27" y1="36" x2="34" y2="36" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Cloud icon top right of box -->
  <ellipse cx="52" cy="20" rx="7" ry="5" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="47" cy="22" rx="5" ry="4" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="57" cy="22" rx="4" ry="3.5" fill="#ffffff" opacity="0.9"/>
  <rect x="42" y="22" width="20" height="5" rx="0" fill="#ffffff" opacity="0.9"/>

  <!-- "rt" text in orange -->
  <text x="84" y="58" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#F3AA31" letter-spacing="-1">rt</text>

  <!-- "Survey" text in dark blue -->
  <text x="117" y="58" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#165382" letter-spacing="-0.5">Survey</text>

  <!-- "by Real-Time Analytics" tagline -->
  <text x="85" y="74" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#165382" opacity="0.75" letter-spacing="0.2">by Real-Time Analytics</text>
</svg>
